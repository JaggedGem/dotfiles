# ─────────────────────────────────────────
#  Starship Configuration  (~/.config/starship.toml)
#  Palette: Gruvbox — vivid accent blocks
#
#  Accent colors used as backgrounds:
#    orange  #fe8019   yellow  #fabd2f
#    green   #b8bb26   aqua    #8ec07c
#    blue    #83a598   purple  #d3869b
#    red     #fb4934
#  Text on all colored blocks: #282828 (dark, high contrast)
#  Separators use the block's own color as fg on transparent bg
# ─────────────────────────────────────────

format = """
[](fg:#fe8019)\
$os\
[](fg:#fe8019 bg:#fabd2f)\
$directory\
[](fg:#fabd2f bg:#b8bb26)\
$git_branch\
$git_status\
[](fg:#b8bb26 bg:#8ec07c)\
$git_metrics\
[](fg:#8ec07c)\
$fill\
$nodejs$rust$python$java\
$cmd_duration\
[](fg:#83a598)\
$time\
[](fg:#83a598)\
$line_break\
$character"""

right_format = ""
add_newline = true

# ── Fill ──────────────────────────────────
[fill]
symbol = " "

# ── Character ─────────────────────────────
[character]
success_symbol = "[❯](bold fg:#b8bb26)"
error_symbol   = "[❯](bold fg:#fb4934)"
vimcmd_symbol  = "[❮](bold fg:#83a598)"

# ── OS ────────────────────────────────────
[os]
format   = "[ $symbol ](bg:#fe8019 fg:#282828 bold)"
disabled = false

[os.symbols]
Arch = ""

# ── Directory ─────────────────────────────
[directory]
format            = "[ 󰉋 $path$read_only ](bg:#fabd2f fg:#282828 bold)"
read_only         = " 󰌾"
truncation_length = 3
truncate_to_repo  = true
home_symbol       = "~"

[directory.substitutions]
"Documents" = "󰈙 Docs"
"Downloads" = " DL"
"Music"     = " Music"
"Pictures"  = " Pics"

# ── Git Branch ────────────────────────────
[git_branch]
format = "[ $symbol$branch ](bg:#b8bb26 fg:#282828 bold)"
symbol = " "

# ── Git Status ────────────────────────────
[git_status]
format     = "[$all_status$ahead_behind ](bg:#b8bb26 fg:#282828 bold)"
conflicted = "!!"
ahead      = "⇡${count}"
behind     = "⇣${count}"
diverged   = "⇕⇡${ahead_count}⇣${behind_count}"
untracked  = "?"
stashed    = "≡"
modified   = "~"
staged     = "+"
renamed    = "»"
deleted    = "✘"

# ── Git Metrics ───────────────────────────
[git_metrics]
format        = "[ +$added -$deleted ](bg:#8ec07c fg:#282828 bold)"
disabled      = false

# ── Time ──────────────────────────────────
[time]
disabled    = false
format      = "[ 󱑍 $time ](bg:#83a598 fg:#282828 bold)"
time_format = "%I:%M %p"

# ── Command Duration ──────────────────────
[cmd_duration]
min_time          = 2_000
format            = "[󱎫 $duration ](fg:#d3869b bold)"
show_milliseconds = false

# ── Languages (inline, no bg — sit between fill and time) ─

[nodejs]
format       = "[ $version ](fg:#8ec07c bold)"
symbol       = " "
detect_files = ["package.json", ".nvmrc"]

[rust]
format = "[ 󱘗 $version ](fg:#fe8019 bold)"
detect_files = ["Cargo.toml"]

[python]
format       = "[ 󰌠 $version ](fg:#fabd2f bold)"
detect_files = ["requirements.txt", "pyproject.toml", ".python-version", "Pipfile"]

[java]
format       = "[  $version ](fg:#fb4934 bold)"
detect_files = ["pom.xml", "build.gradle", "*.java"]

[package]
format   = "[󰏗 $version ](fg:#d3869b bold)"
disabled = false

# ── Disabled clutter ──────────────────────
[aws]
disabled = true
[gcloud]
disabled = true
[azure]
disabled = true
[docker_context]
disabled = true
[username]
disabled = true
